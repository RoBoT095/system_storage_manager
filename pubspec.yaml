publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  path: ^1.9.1
  file_picker: ^11.0.2
  saf_stream: ^2.0.0
